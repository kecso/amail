# Portainer: netviel only — mount the Maildir your bare-metal mbsync (or any sync) already fills.
# Replace YOUR_GH_USER and host paths. Pin image tags to sha-... for a known-good commit.
#
# Pre-built: ghcr.io/<user>/amail-netviel

services:
  netviel:
    image: ghcr.io/YOUR_GH_USER/amail-netviel:latest
    container_name: amail-netviel
    ports:
      - "5000:5000"
    environment:
      TZ: UTC
      NOTMUCH_PATH: /app/mail
    volumes:
      - /path/on/host/maildir:/mail:ro
      - /path/on/host/notmuch-index:/app/mail/.notmuch
    restart: unless-stopped

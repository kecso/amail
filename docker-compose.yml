services:
  netviel:
    build:
      context: .
      dockerfile: docker/netviel.Dockerfile
    image: amail-netviel:local
    container_name: amail-netviel
    ports:
      - "5000:5000"
    environment:
      TZ: UTC
      NOTMUCH_PATH: /app/mail
    volumes:
      # Your Maildir tree from the host (e.g. where bare-metal mbsync writes)
      - ./storage/mail:/mail:ro
      - ./storage/notmuch:/app/mail/.notmuch
    restart: unless-stopped
